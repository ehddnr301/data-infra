services:
  clawbot:
    image: python:3.12-slim
    container_name: clawbot-pseudolab
    working_dir: /workspace/domains/integration/openclaw/src
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONUNBUFFERED: "1"
    command: >
      sh -c "
      pip install --no-cache-dir /workspace/domains/integration/openclaw &&
      uvicorn app:app --host 0.0.0.0 --port 8080
      "
    ports:
      - "30023:8080"
    volumes:
      - ../../:/workspace
      - ./healthcheck.sh:/healthcheck.sh:ro
    healthcheck:
      test: ["CMD", "sh", "/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - clawbot-net

networks:
  clawbot-net:
    external: true
    name: clawbot-net
